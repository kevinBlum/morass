name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: "@effigy-analytics"

      - run: npm ci
      - run: npm run check

      # project .npmrc points the scope at public npmjs for consumers and
      # outranks both setup-node's registry-url and publishConfig.registry;
      # this job must pin the scope to GH Packages for view + publish
      - name: Pin scope registry to GitHub Packages
        run: |
          echo "@effigy-analytics:registry=https://npm.pkg.github.com" > .npmrc
          test "$(npm config get @effigy-analytics:registry)" = "https://npm.pkg.github.com"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v${PACKAGE_VERSION}"

      - name: Check if version already on GitHub Packages
        id: exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "@effigy-analytics/morass@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.exists.outputs.exists == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npmjs:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          scope: "@effigy-analytics"

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest && npm --version

      - run: npm ci
      - run: npm run check

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v${PACKAGE_VERSION}"

      - name: Check if version already on npmjs
        id: exists
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "@effigy-analytics/morass@${PACKAGE_VERSION}" version \
            --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (trusted publishing — no token)
        if: steps.exists.outputs.exists == 'false'
        run: |
          npm pkg delete publishConfig
          # project .npmrc outranks setup-node's registry-url; assert the
          # scope resolves to npmjs or publish silently targets GH Packages
          test "$(npm config get @effigy-analytics:registry)" = "https://registry.npmjs.org"
          npm publish --access public
